<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>MATEMATIVA - Exposição Interativa de Matemática</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 10px;
      margin: 0;
      padding: 0;
      background-color: #3E4095;
    }

    .pagina {
      max-width: 900px;
      margin: 0 auto;
      background-color: white;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 100vh;
    }

    .topo {
      background-color: #3E4095;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .topo img { height: 50px; margin-right: 10px; }
    .titulo { display: flex; flex-direction: column; }
    .subtitulo { font-size: 18px; }

    .acervo {
      text-align: right;
      font-weight: bold;
      font-size: 10px;
      padding: 5px 20px;
      background-color: #3E4095;
      color: white;
    }

    .container {
      display: flex;
      padding: 20px;
    }

    .ficha {
      flex: 2;
    }

    .ficha table {
      width: 100%;
      border-collapse: collapse;
    }

    .ficha td {
      padding: 5px;
      border-bottom: 1px solid #ccc;
    }
    .ficha td:first-child {
      width: 40%;
      font-weight: bold;
    }
    .lateral {
      flex: 1;
      padding-left: 10px;
      text-align: center;
    }

    .lateral img {
      width: 100%;
      max-width: 150px;
      margin-bottom: 5px;
      border: 1px solid #ccc;
    }

    .busca {
      margin-top: 10px;
    }

    .busca button {
      margin-top: 5px;
    }

    .rodape {
      background-color: #3E4095;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: white;
    }

    .rodape img {
      padding: 10px;
      height: 70px;
      margin: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="pagina">
  <div class="topo">
    <img src="matemativa.png" alt="Logo Matemativa">
  </div>

  <div class="acervo">ACERVO ON-LINE</div>

  <div class="container">
    <div class="ficha">
      <table id="tabela-ficha"></table>
    </div>
    <div class="lateral">
      <div id="imagens"></div>
      <div class="busca">
        <label for="busca-id"><strong>Ir para objeto:</strong></label><br>
        <input type="text" id="busca-id" placeholder="Ex: P001">
        <button onclick="buscarObjeto()">Buscar</button>
        <div style="margin-top: 15px;">
          <button onclick="navegar(-1)">← Anterior</button>
          <button onclick="navegar(1)">Próximo →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="rodape">
    <img src="apoio.png" alt="Apoios"> 
    <div>© MATEMATIVA - Todos os direitos reservados.</div>
  </div>

  <script>
    const objetos = {
      "P001": {
        "dados": {
          "Peça Nº": "001",
          "Setor": "Geometria das Curvas e Superfícies",
          "Percurso": "Construção de Retas",
          "Nome Genérico": "Quadro Branco",
          "Descrição": "Peça de madeira MDF com fórmica branca.",
          "Objetivo": "Perceber a diferença entre perfil e instrumento para traçar curvas, em particular, retas e circunferências.",
          "Como funciona?": "O visitante começa com um lápis, um pincel atômico e um simples pedaço de barbante sobre um quadro branco, com os quais é convidado a desenhar uma reta e uma circunferência. Neste processo, ele é levado a perceber a diferença entre perfil e instrumento.",
          "Dimensões (LxCxA)": "50 cm x 60 cm x 6 cm"
        },
        "imagens": ["P001.png"]
      },
     "P002": {
        "dados": {
          "Peça Nº": "002",
          "Setor": "Geometria das Curvas e Superfícies",
          "Percurso": "Construção de Retas",
          "Nome Genérico": "Mecanismo de Watt",
          "Descrição": "Peça de madeira MDF em fórmica branca com articulações em barras de alumínio.",
          "Objetivo": "Traçar uma reta de forma aproximada utilizando o mecanismo de Watt.",
          "Como funciona?": "Desenvolvido em 1784 por James Watt, este é um simples mecanismo articulado de três hastes, feito de tal modo que o ponto médio do lado menor se mova para cima e para baixo ao longo de uma trajetória retilínea. A parte central do traçado fornece aproximadamente um segmento de reta.",
          "Dimensões (LxCxA)": "50 cm x 60 cm x 6 cm"
        },
        "imagens": ["P002.png"]
      },
      "P003": {
        "dados": {
          "Peça Nº": "003",
          "Setor": "Geometria das Curvas e Superfícies",
          "Percurso": "Construção de Retas",
          "Nome Genérico": "Mecanismo de Tchebycheff",
          "Descrição": "Peça de madeira MDF em fórmica branca com articulações em barras de alumínio.",
          "Objetivo": "Traçar uma reta de forma aproximada utilizando o mecanismo de Tchebycheff.",
          "Como funciona?": "Desenvolvido em 1850 por Pafnuty Lvovich Chebyshev, este é um simples mecanismo articulado de três hastes, feito de modo que o ponto médio do lado menor se mova para esquerda e para direita ao longo de uma trajetória aproximadamente retilínea. A parte central do traçado fornece aproximadamente um segmento de reta.Neste mecanismo, é preservada a proporção AD:CD:AB = 5:4:2.",
          "Dimensões (LxCxA)": "50 cm x 60 cm x 6 cm"
        },
        "imagens": ["P003.png"]
      },
     "P004": {
        "dados": {
          "Peça Nº": "004",
          "Setor": "Geometria das Curvas e Superfícies",
          "Percurso": "Construção de Retas",
          "Nome Genérico": "Mecanismo de Roberts",
          "Descrição": "Peça de madeira MDF em fórmica branca com articulações em barras de alumínio.",
          "Objetivo": "Traçar uma reta de forma aproximada utilizando o mecanismo de Roberts.",
          "Como funciona?": "Desenvolvido em 1860 por Richard Roberts, é um simples mecanismo articulado de três hastes e um pentágono de madeira, feito de modo que o vértice oposto ao lado sobre a haste menor se mova para esquerda e para direita ao longo de uma trajetória aproximadamente retilínea. Neste mecanismo, deve ser considerada as medidas AB = BP = PC = CD e AD = 2.BC.",
          "Dimensões (LxCxA)": "50 cm x 70 cm x 6 cm"
        },
        "imagens": ["P004.png"]
        }
      };

    const chaves = Object.keys(objetos);
    let indiceAtual = 0;

    function exibirObjeto(id) {
      const objeto = objetos[id];
      if (!objeto) {
        alert("Objeto não encontrado.");
        return;
      }

      indiceAtual = chaves.indexOf(id);
      if (indiceAtual === -1) indiceAtual = 0;

      const tabela = document.getElementById("tabela-ficha");
      tabela.innerHTML = "";
      for (const chave in objeto.dados) {
        tabela.innerHTML += `<tr><td><strong>${chave}</strong></td><td>${objeto.dados[chave]}</td></tr>`;
      }

      const imgContainer = document.getElementById("imagens");
      imgContainer.innerHTML = "";
      objeto.imagens.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "Imagem do objeto";

        if (src === "P001_qr.png") {
          const link = document.createElement("a");
          link.href = "https://drive.google.com/file/d/1lBkJ0ZBv1H4mmna15cNYFMbVXi1yPB9O/view?usp=drive_link";
          link.target = "_blank";
          link.appendChild(img);
          imgContainer.appendChild(link);
        } else {
          imgContainer.appendChild(img);
        }
      });

      document.getElementById("busca-id").value = id;
    }

    function buscarObjeto() {
      const id = document.getElementById("busca-id").value.trim();
      exibirObjeto(id);
    }

    function navegar(direcao) {
      let novoIndice = indiceAtual + direcao;
      if (novoIndice < 0) novoIndice = 0;
      if (novoIndice >= chaves.length) novoIndice = chaves.length - 1;
      exibirObjeto(chaves[novoIndice]);
    }

    exibirObjeto(chaves[0]);
  </script>
</div>
</body>
</html>
